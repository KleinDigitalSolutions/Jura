services:
  ingestion-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: legal-rag-ingestion
    environment:
      - LLM_BINDING_API_KEY=${LLM_BINDING_API_KEY}
      - LLM_BINDING_HOST=${LLM_BINDING_HOST:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - EMBEDDING_BINDING_HOST=${EMBEDDING_BINDING_HOST:-http://host.docker.internal:11434/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-m3:latest}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - RAG_STORAGE_DIR=/app/rag_storage
      - BATCH_SIZE=${BATCH_SIZE:-50}
      - CRON_DAY=${CRON_DAY:-saturday}
      - CRON_TIME=${CRON_TIME:-02:00}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=Europe/Berlin
    volumes:
      - ../rag_storage:/app/rag_storage
      - ../logs:/app/logs
    restart: unless-stopped
    # For weekly scheduler mode, change CMD:
    # command: ["--schedule"]

